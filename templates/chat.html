{% extends "base.html" %}

{% block content %}

<style>
/* Layout */
.chat-layout {
    display: flex;
    height: 520px;
    border-radius: 14px;
    overflow: hidden;
    border: 1px solid #e6e8ff;
}

/* Sidebar */
.sidebar {
    width: 260px;
    background: #f7f8ff;
    border-right: 1px solid #e0e3ff;
    padding: 15px;
    display: flex;
    flex-direction: column;
}

.sidebar h3 {
    margin-bottom: 10px;
    font-size: 16px;
}

.room-list {
    list-style: none;
    padding: 0;
    overflow-y: auto;
}

.room-list li {
    padding: 10px;
    border-radius: 8px;
    margin-bottom: 6px;
    cursor: pointer;
    transition: 0.2s;
}

.room-list li:hover {
    background: #e9ecff;
}

/* Chat Area */
.chat-area {
    flex: 1;
    display: flex;
    flex-direction: column;
    background: #ffffff;
}

/* Header */
.chat-header {
    padding: 12px 16px;
    border-bottom: 1px solid #eee;
    display: flex;
    justify-content: space-between;
    align-items: center;
}

.chat-title {
    font-weight: 600;
    font-size: 16px;
}

/* Messages */
#messages {
    flex: 1;
    overflow-y: auto;
    padding: 15px;
    background: #f4f6ff;
    display: flex;
    flex-direction: column;
}

/* Message styles */
.message-row {
    display: flex;
    margin-bottom: 10px;
}

.message-me {
    justify-content: flex-end;
}

.message-other {
    justify-content: flex-start;
}

.message-bubble {
    padding: 10px 14px;
    border-radius: 14px;
    max-width: 65%;
    font-size: 14px;
    box-shadow: 0 2px 6px rgba(0,0,0,0.08);
}

.message-me .message-bubble {
    background: linear-gradient(135deg, #667eea, #764ba2);
    color: white;
}

.message-other .message-bubble {
    background: white;
    color: #333;
}

/* Input */
.chat-input {
    display: flex;
    padding: 10px;
    border-top: 1px solid #eee;
    gap: 10px;
}

.chat-input input {
    flex: 1;
    padding: 10px;
    border-radius: 8px;
    border: 1px solid #ddd;
}

.chat-input button {
    width: 90px;
}
</style>

<div class="chat-layout">

```
<!-- Sidebar -->
<div class="sidebar">
    <h3>Rooms</h3>
    <ul class="room-list" id="roomList">
        <li>Loading...</li>
    </ul>
</div>

<!-- Chat Area -->
<div class="chat-area">

    <div class="chat-header">
        <div class="chat-title">Room {{ room_id }}</div>
        <small id="status" style="color: orange;">Connecting...</small>
    </div>

    <div id="messages"></div>

    <div class="chat-input">
        <input id="messageText" placeholder="Type a message...">
        <button onclick="sendMessage()">Send</button>
    </div>

</div>
```

</div>

<script>
const token = localStorage.getItem("token");
const username = localStorage.getItem("username");
const roomId = "{{ room_id }}";

if (!token || !username) window.location.href = "/";

/* Sidebar rooms */
function loadRooms() {
    fetch("/api/chat/rooms/", {
        headers: {"Authorization": "Bearer " + token}
    })
    .then(res => res.json())
    .then(data => {
        const list = document.getElementById("roomList");
        list.innerHTML = "";

        data.forEach(room => {
            const li = document.createElement("li");
            li.textContent = room.name;
            li.onclick = () => window.location.href = "/chat/" + room.id + "/";
            if (room.id == roomId) {
                li.style.background = "#e0e4ff";
                li.style.fontWeight = "600";
            }
            list.appendChild(li);
        });
    });
}

/* Add message bubble */
function addMessage(user, text) {
    const box = document.getElementById("messages");
    const row = document.createElement("div");

    const isMe = user === username;
    row.className = "message-row " + (isMe ? "message-me" : "message-other");

    row.innerHTML = `
        <div class="message-bubble">
            ${!isMe ? `<small style="opacity:0.6">${user}</small><br>` : ""}
            ${text}
        </div>
    `;

    box.appendChild(row);
    box.scrollTop = box.scrollHeight;
}

/* Load old messages */
function loadMessages() {
    fetch(`/api/chat/rooms/${roomId}/messages/`, {
        headers: {"Authorization": "Bearer " + token}
    })
    .then(res => res.json())
    .then(data => {
        const box = document.getElementById("messages");
        box.innerHTML = "";
        data.forEach(msg => {
            addMessage(msg.sender.username, msg.content);
        });
    });
}

/* WebSocket */
const protocol = window.location.protocol === "https:" ? "wss://" : "ws://";
const socket = new WebSocket(protocol + window.location.host + "/ws/chat/" + roomId + "/");

socket.onopen = () => {
    const status = document.getElementById("status");
    status.textContent = "Connected";
    status.style.color = "green";
};

socket.onmessage = (e) => {
    const data = JSON.parse(e.data);
    addMessage(data.username, data.message);
};

socket.onclose = () => {
    const status = document.getElementById("status");
    status.textContent = "Disconnected";
    status.style.color = "red";
};

/* Send message */
function sendMessage() {
    const input = document.getElementById("messageText");
    const message = input.value.trim();
    if (!message) return;

    if (socket.readyState !== WebSocket.OPEN) {
        alert("Not connected. Refresh page.");
        return;
    }

    socket.send(JSON.stringify({
        message: message,
        username: username
    }));

    input.value = "";
}

/* Enter key */
document.getElementById("messageText").addEventListener("keypress", (e) => {
    if (e.key === "Enter") sendMessage();
});

loadRooms();
loadMessages();
</script>

{% endblock %}
